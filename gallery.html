<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gannoe Media — Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script>
  /* theme: dark edition links pass ?theme=dark; everything else gets the Penn look */
  window.GM_THEME = new URLSearchParams(location.search).get('theme') === 'dark' ? 'dark' : 'penn';
  document.documentElement.classList.add(window.GM_THEME);
</script>
<link id="theme-css" rel="stylesheet" href="gm-redesign-dark.css" />
<script>
  if (window.GM_THEME === 'penn') document.getElementById('theme-css').href = 'gm-redesign-penn.css';
</script>
<style>
  /* ===== gallery page — depth grid wall ===== */
  .gal-head {
    padding: 140px 34px 30px;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap;
    background: radial-gradient(70% 50% at 80% -10%, rgba(36, 74, 140, 0.3), transparent 60%), var(--bg);
  }
  .gal-head h1 {
    font-size: clamp(70px, 9vw, 150px); font-weight: 800; line-height: 0.9;
    text-transform: uppercase; letter-spacing: 0.015em;
  }
  .gal-head h1 em { font-style: normal; color: transparent; -webkit-text-stroke: 1.5px rgba(91, 141, 232, 0.7); }
  .gal-head .meta { font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); padding-bottom: 12px; }

  .gal-body { padding: 10px 34px 80px; }
  #g4-filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 26px; }
  .chip {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px; padding: 9px 16px; cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .chip:hover { color: #fff; }
  .chip.active { color: #fff; border-color: rgba(79, 127, 216, 0.6); background: rgba(36, 74, 140, 0.28); box-shadow: 0 0 16px rgba(36, 74, 140, 0.4); }

  #g4-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 160px; gap: 14px; }
  .g4-card { position: relative; border-radius: 14px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.08); transition: border-color 0.25s, box-shadow 0.25s; background: var(--bg2); }
  .g4-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6) saturate(0.85); transition: filter 0.3s; }
  .g4-card:hover { border-color: rgba(79, 127, 216, 0.6); box-shadow: 0 14px 50px rgba(36, 74, 140, 0.5); }
  .g4-card:hover img { filter: brightness(0.95) saturate(1.05); }
  .g4-card .meta { position: absolute; left: 14px; bottom: 12px; right: 14px; display: flex; flex-direction: column; gap: 3px; }
  .g4-card .meta b { font-size: 14px; text-shadow: 0 3px 16px rgba(0, 0, 0, 0.85); }
  .g4-card .meta span { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(150, 185, 255, 0.85); }

  @media (max-width: 1100px) { #g4-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 760px) { #g4-grid { grid-template-columns: repeat(2, 1fr); } .gal-body, .gal-head { padding-left: 16px; padding-right: 16px; } }
  @media (max-width: 640px) {
    .gal-head { padding-top: 100px; padding-bottom: 20px; flex-direction: column; align-items: flex-start; gap: 8px; }
    .gal-head .meta { padding-bottom: 0; font-size: 10px; }
    #g4-grid { grid-auto-rows: 130px; gap: 10px; }
    .g4-card .meta b { font-size: 12px; }
    .chip { font-size: 9px; padding: 7px 12px; }
    #lb-foot { flex-direction: column; gap: 6px; padding: 14px 4px 0; }
    #lb-title { font-size: 20px; }
  }

  .gnav .links a.cur { color: #fff; }

  /* ===== Penn State edition — white field, soft Penn-blue glow ===== */
  html.penn .gnav .links a.cur { color: var(--navy); }
  html.penn .gal-head {
    background: radial-gradient(70% 50% at 80% -10%, rgba(30, 64, 124, 0.14), transparent 60%), var(--bg);
  }
  html.penn .gal-head h1 em { -webkit-text-stroke: 1.5px var(--navy); }
  html.penn .gal-body {
    background: radial-gradient(55% 40% at 12% 6%, rgba(150, 190, 230, 0.22), transparent 65%),
                radial-gradient(50% 45% at 92% 85%, rgba(30, 64, 124, 0.1), transparent 65%), var(--bg);
  }
  html.penn .chip { color: var(--muted); background: #fff; border: 1px solid var(--line); }
  html.penn .chip:hover { color: var(--navy); }
  html.penn .chip.active { color: #fff; border-color: var(--navy); background: var(--navy); box-shadow: 0 0 16px rgba(30, 64, 124, 0.28); }
  html.penn .g4-card { border: 1px solid var(--line); background: var(--ink); box-shadow: 0 10px 28px rgba(12, 27, 51, 0.1); }
  html.penn .g4-card:hover { border-color: rgba(30, 64, 124, 0.5); box-shadow: 0 14px 50px rgba(30, 64, 124, 0.28); }
  html.penn .g4-card img { filter: brightness(0.85) saturate(0.95); }
  html.penn .g4-card:hover img { filter: brightness(1) saturate(1.05); }
  html.penn .g4-card .meta b { color: #fff; }
</style>
</head>
<body>

  <nav class="gnav" data-screen-label="Nav">
    <a class="brand" href="index.html">Gannoe<i>&nbsp;Media</i></a>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="gallery.html" class="cur">Gallery</a>
      <a href="index.html#services">Services</a>
      <a href="index.html#contact">About</a>
    </div>
    <div class="right">
      <a class="swap" href="index.html">&larr; Back home</a>
      <a class="btn-solid magnetic" href="index.html#contact">Start a project</a>
    </div>
    <button class="burger" aria-label="Menu"><span></span><span></span><span></span></button>
    <div class="mob-menu">
      <a href="index.html">Home</a>
      <a href="gallery.html" class="cur">Gallery</a>
      <a href="index.html#services">Services</a>
      <a href="index.html#contact">About</a>
      <a class="btn-solid" href="index.html#contact">Start a project</a>
    </div>
  </nav>

  <header class="gal-head" data-screen-label="Gallery Header">
    <div>
      <span class="kicker">Full archive</span>
      <h1>The <em>wall.</em></h1>
    </div>
    <span class="meta">2024 &mdash; 2026 &middot; FILTER BY TYPE</span>
  </header>

  <main class="gal-body" id="G4" data-screen-label="Depth Grid">
    <div id="g4-filters">
      <button class="chip active" data-f="All">All</button>
      <button class="chip" data-f="Highlights">Highlights</button>
      <button class="chip" data-f="Commercial">Commercial</button>
      <button class="chip" data-f="Photography">Photography</button>
    </div>
    <div id="g4-grid"></div>
  </main>

  <footer class="foot" data-screen-label="Footer">
    <div class="row" style="padding-top: 4vh;">
      <span>&copy; 2026 Gannoe Media &middot; Connecticut</span>
      <div class="fl-links">
        <a href="https://www.instagram.com/gannoemedia/">Instagram</a>
        <a href="https://www.tiktok.com/@henrygannoe">TikTok</a>
        <a href="https://www.linkedin.com/in/henry-gannoe-513017252">LinkedIn</a>
      </div>
    </div>
  </footer>

  <!-- shared lightbox viewer -->
  <div id="lb" aria-modal="true" role="dialog">
    <button id="lb-close" aria-label="Close">&#10005;</button>
    <div id="lb-card">
      <div id="lb-media"></div>
      <div id="lb-foot"><h3 id="lb-title"></h3><span id="lb-cat"></span></div>
    </div>
  </div>

  <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="gallery-data.js"></script>
  <script src="gm-cms-config.js"></script>
  <script src="gm-cms.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <script src="gm-gallery-shared.js"></script>
  <script src="gm-redesign-engine.js"></script>
  <script>
    (function () {
      /* dark edition: keep nav pointing back to dark.html and carry the theme on gallery links */
      if (window.GM_THEME === 'dark') {
        document.querySelectorAll('a[href^="index.html"]').forEach((a) => {
          a.href = a.getAttribute('href').replace('index.html', 'dark.html');
        });
        document.querySelectorAll('a[href="gallery.html"]').forEach((a) => {
          a.href = 'gallery.html?theme=dark';
        });
      }
      GM.magnetic();
      GM_loadMedia().then(() => {
        GMGallery.lightbox();
        GMGallery.depthGrid('#G4', '#g4-grid', '#g4-filters');
        if (!document.hidden) {
          gsap.fromTo('.gal-head > *', { opacity: 0, y: 26 }, { opacity: 1, y: 0, duration: 0.8, stagger: 0.08, ease: 'power3.out' });
          gsap.fromTo('.g4-card', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.7, stagger: 0.035, ease: 'power3.out', delay: 0.2, clearProps: 'opacity' });
        }
      });
    })();
  </script>

</body>
</html>
